<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ · Benta</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- การ์ดล็อกอิน -->
        <div class="auth-card">
            <!-- โลโก้ -->
            <a href="index.html" class="auth-logo">🔷 Benta</a>
            
            <!-- หัวข้อ -->
            <h1 class="auth-title">ยินดีต้อนรับกลับมา</h1>
            <p class="auth-subtitle">ลงชื่อเข้าใช้เพื่อดำเนินการต่อ</p>
            
            <!-- จุดแสดงผล (เปลี่ยนตามสถานะล็อกอิน) -->
            <div id="auth-render-area"></div>
            
            <!-- ลิงก์กลับ -->
            <a href="index.html" class="auth-footer-link">← กลับหน้าหลัก</a>
        </div>
        
        <!-- Footer -->
        <div class="auth-footer">
            <p>&copy; 2026 Benta. All rights reserved.</p>
        </div>
    </div>

    <script>
        // ========== Firebase Config ==========
        const firebaseConfig = {
            apiKey: "AIzaSyDUotTGRXmMNGRmVqwAZQaWPuoJLSVQzTE",
            authDomain: "godruj-cf845.firebaseapp.com",
            projectId: "godruj-cf845",
            storageBucket: "godruj-cf845.firebasestorage.app",
            messagingSenderId: "842695726741",
            appId: "1:842695726741:web:11c1de5cc7458bf4cfad9c"
        };

        // เริ่มต้น Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();
        
        const renderArea = document.getElementById('auth-render-area');
        
        // ========== หน้าล็อกอิน ==========
        function renderLogin() {
            renderArea.innerHTML = `
                <button id="google-login-btn" class="auth-btn auth-btn-google">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    ดำเนินการต่อด้วย Google
                </button>
                
                <div class="auth-divider">
                    <span>หรือ</span>
                </div>
                
                <form id="email-login-form" class="auth-form">
                    <div class="form-group">
                        <label for="email">อีเมล</label>
                        <input type="email" id="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">รหัสผ่าน</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="auth-btn auth-btn-primary">เข้าสู่ระบบ</button>
                </form>
                
                <p id="login-error" class="auth-error"></p>
                <p class="auth-switch">
                    ยังไม่มีบัญชี? <a href="#" id="show-signup">สมัครสมาชิก</a>
                </p>
            `;
            
            // Google Login
            document.getElementById('google-login-btn').addEventListener('click', async () => {
                try {
                    await auth.signInWithPopup(provider);
                    window.location.href = 'home.html';
                } catch (error) {
                    document.getElementById('login-error').innerText = '❌ ' + error.message;
                }
            });
            
            // Email Login (ตัวอย่าง - ต้องเปิดใน Firebase ก่อน)
            document.getElementById('email-login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                    window.location.href = 'home.html';
                } catch (error) {
                    document.getElementById('login-error').innerText = '❌ ' + error.message;
                }
            });
            
            // เปลี่ยนเป็นหน้าสมัคร
            document.getElementById('show-signup').addEventListener('click', (e) => {
                e.preventDefault();
                renderSignup();
            });
        }
        
        // ========== หน้าสมัครสมาชิก ==========
        function renderSignup() {
            renderArea.innerHTML = `
                <form id="signup-form" class="auth-form">
                    <div class="form-group">
                        <label for="signup-name">ชื่อ</label>
                        <input type="text" id="signup-name" placeholder="Your name" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-email">อีเมล</label>
                        <input type="email" id="signup-email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-password">รหัสผ่าน</label>
                        <input type="password" id="signup-password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="auth-btn auth-btn-primary">สมัครสมาชิก</button>
                </form>
                
                <div class="auth-divider"><span>หรือ</span></div>
                
                <button id="google-signup-btn" class="auth-btn auth-btn-google">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    สมัครด้วย Google
                </button>
                
                <p id="signup-error" class="auth-error"></p>
                <p class="auth-switch">
                    มีบัญชีอยู่แล้ว? <a href="#" id="show-login">เข้าสู่ระบบ</a>
                </p>
            `;
            
            // Google Signup
            document.getElementById('google-signup-btn').addEventListener('click', async () => {
                try {
                    await auth.signInWithPopup(provider);
                    window.location.href = 'home.html';
                } catch (error) {
                    document.getElementById('signup-error').innerText = '❌ ' + error.message;
                }
            });
            
            // Email Signup
            document.getElementById('signup-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('signup-email').value;
                const password = document.getElementById('signup-password').value;
                const name = document.getElementById('signup-name').value;
                try {
                    const result = await auth.createUserWithEmailAndPassword(email, password);
                    await result.user.updateProfile({ displayName: name });
                    window.location.href = 'home.html';
                } catch (error) {
                    document.getElementById('signup-error').innerText = '❌ ' + error.message;
                }
            });
            
            // กลับไปหน้า login
            document.getElementById('show-login').addEventListener('click', (e) => {
                e.preventDefault();
                renderLogin();
            });
        }
        
        // ========== หน้าหลังล็อกอิน (ถ้าล็อกอินอยู่แล้ว) ==========
        function renderLoggedIn(user) {
            renderArea.innerHTML = `
                <div class="auth-profile">
                    <img src="${user.photoURL || 'https://via.placeholder.com/80'}" alt="Profile" class="auth-avatar">
                    <h3>${user.displayName || 'ผู้ใช้'}</h3>
                    <p>${user.email}</p>
                    
                    <button id="continue-btn" class="auth-btn auth-btn-primary">ไปหน้าหลัก</button>
                    <button id="logout-btn" class="auth-btn auth-btn-outline">ออกจากระบบ</button>
                </div>
            `;
            
            document.getElementById('continue-btn').addEventListener('click', () => {
                window.location.href = 'home.html';
            });
            
            document.getElementById('logout-btn').addEventListener('click', async () => {
                await auth.signOut();
                renderLogin();
            });
        }
        
        // ========== เช็คสถานะล็อกอิน ==========
        auth.onAuthStateChanged(user => {
            if (user) {
                renderLoggedIn(user);
            } else {
                renderLogin();
            }
        });
    </script>
</body>
</html>
